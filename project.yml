name: UniOS

options:
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

configs:
  Debug: debug
  Release: release

packages:
  TDLibKit:
    path: Vendor/PatchedTDLibKit

settings:
  base:
    PRODUCT_NAME: UniOS
    PRODUCT_BUNDLE_IDENTIFIER: net.dziwisz.unios
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "5.10"
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    TARGETED_DEVICE_FAMILY: 1,2

targets:
  UniOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: Config/Base.xcconfig
      Release: Config/Base.xcconfig
    sources:
      - path: Sources
    dependencies:
      - package: TDLibKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Config/UniOS-Info.plist
        PRODUCT_MODULE_NAME: UniOS
        SUPPORTS_MACCATALYST: NO

  UniOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: Config/Base.xcconfig
      Release: Config/Base.xcconfig
    sources:
      - path: Tests
    dependencies:
      - target: UniOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: net.dziwisz.unios.tests
        PRODUCT_MODULE_NAME: UniOSTests

schemes:
  UniOS:
    build:
      targets:
        UniOS: all
        UniOSTests: [test]
    run:
      config: Debug
      executable: UniOS
    test:
      config: Debug
      gatherCoverageData: true
      coverageTargets:
        - UniOS
      targets:
        - name: UniOSTests
    archive:
      config: Release
