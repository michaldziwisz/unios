name: UniOS

options:
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

configs:
  Debug: debug
  Release: release

packages:
  TDLibKit:
    url: https://github.com/Swiftgram/TDLibKit
    exactVersion: 1.5.2-tdlib-1.8.62-af0cb1d3

settings:
  base:
    PRODUCT_NAME: UniOS
    PRODUCT_BUNDLE_IDENTIFIER: net.dziwisz.unios
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "5.10"
    GENERATE_INFOPLIST_FILE: YES
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    INFOPLIST_KEY_CFBundleDisplayName: UniOS
    INFOPLIST_KEY_NSCameraUsageDescription: UniOS uses the camera to capture accessible photo and video messages.
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.social-networking
    INFOPLIST_KEY_NSContactsUsageDescription: UniOS uses contacts to expose accessible quick actions for conversations.
    INFOPLIST_KEY_NSMicrophoneUsageDescription: UniOS uses the microphone to record accessible voice notes.
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: UniOS uses your photo library to attach accessible media messages.
    INFOPLIST_KEY_TELEGRAM_API_HASH: $(TELEGRAM_API_HASH)
    INFOPLIST_KEY_TELEGRAM_API_ID: $(TELEGRAM_API_ID)
    INFOPLIST_KEY_TELEGRAM_USE_TEST_DC: $(TELEGRAM_USE_TEST_DC)
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
    TARGETED_DEVICE_FAMILY: 1,2

targets:
  UniOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: Config/Base.xcconfig
      Release: Config/Base.xcconfig
    sources:
      - path: Sources
    dependencies:
      - package: TDLibKit
    settings:
      base:
        INFOPLIST_KEY_CFBundleName: UniOS
        PRODUCT_MODULE_NAME: UniOS
        SUPPORTS_MACCATALYST: NO

  UniOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: Config/Base.xcconfig
      Release: Config/Base.xcconfig
    sources:
      - path: Tests
    dependencies:
      - target: UniOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: net.dziwisz.unios.tests
        PRODUCT_MODULE_NAME: UniOSTests

schemes:
  UniOS:
    build:
      targets:
        UniOS: all
        UniOSTests: [test]
    run:
      config: Debug
      executable: UniOS
    test:
      config: Debug
      gatherCoverageData: true
      coverageTargets:
        - UniOS
      targets:
        - name: UniOSTests
    archive:
      config: Release
